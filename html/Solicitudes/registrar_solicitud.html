<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Solicitar Equipo</title>
    <link rel="stylesheet" href="/Proyecto_Bases/css/estilos.css">
    <link rel="stylesheet" href="/Proyecto_Bases/css/registrar_solicitud.css">
</head>

<body>

    <div class="login-panel">

        <h1>Solicitar Equipo</h1>

        <form action="/Proyecto_Bases/php/Solicitudes/registrar_solicitud.php" method="POST">

            <label for="id_equipo">Equipo</label>
            <select name="id_equipo" id="id_equipo" required>
                <option value="">Seleccione un equipo</option>
                <option value="1">Portátil Dell</option>
                <option value="2">Monitor LG</option>
                <option value="3">Teclado Logitech</option>
            </select>

            <label for="cantidad">Cantidad</label>
            <input
                type="number"
                id="cantidad"
                name="cantidad"
                min="1"
                required
            >

            <label for="fecha_retorno">Fecha de retorno</label>
            <input
                type="date"
                id="fecha_retorno"
                name="fecha_retorno"
                required
            >

            <label for="observacion">Observación</label>
            <textarea
                id="observacion"
                name="observacion"
                rows="4"
                placeholder="Escriba aquí una observación..."
            ></textarea>

            <div class="botones">

                <a href="/Proyecto_Bases/html/Usuario/menu_cliente.html">
                    <button type="button">
                        Enviar solicitud
                    </button>
                </a>

                <a href="/Proyecto_Bases/html/Usuario/menu_cliente.html">
                    <button type="button">
                        Cancelar
                    </button>
                </a>

            </div>

        </form>

    </div>

</body>
</html>
