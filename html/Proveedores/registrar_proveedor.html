<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Proveedor</title>
    <link rel="stylesheet" href="/Proyecto_Bases/css/estilos.css">
    <link rel="stylesheet" href="/Proyecto_Bases/css/registrar_usuario.css">
</head>
<body>

    <div class="login-panel">
        <h2>Registrar Nuevo Proveedor</h2>

        <form action="/Proyecto_Bases/php/Proveedor/registrar_proveedor.php" method="POST" class="formulario-registro">
            
            <div class="campo">
                <label for="nombre">Nombre del Proveedor:</label>
                <input type="text" id="nombre" name="nombre">
            </div>

            <div class="campo">
                <label for="nit">NIT:</label>
                <input type="text" id="nit" name="nit">
            </div>

            <div class="campo">
                <label for="correo">Correo Electrónico:</label>
                <input type="email" id="correo" name="correo">
            </div>

            <div class="campo">
                <label for="telefono">Teléfono:</label>
                <input type="text" id="telefono" name="telefono">
            </div>

            <br>
            <a href="/Proyecto_Bases/php/Proveedor/listar_proveedores.php">
                <button type="submit">Guardar</button>
            </a>
            <a href="/Proyecto_Bases/php/Sistema/menu_admin.php">
                <button type="submit">Volver al menú</button>
            </a>
        </form>
    </div>
</body>
</html>
