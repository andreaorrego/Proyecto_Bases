<form action="../php/registrar_solicitud.php" method="POST">

    <input type="number"
           name="id_cliente"
           placeholder="ID cliente"
           required>

    <input type="number"
           name="id_equipo"
           placeholder="ID equipo"
           required>

    <input type="text"
           name="observacion"
           placeholder="Observación">

    <input type="number"
           name="cantidad"
           placeholder="Cantidad"
           required>

    <input type="date"
           name="fecha_retorno">

    <button type="submit">
        Registrar solicitud
    </button>

</form>
