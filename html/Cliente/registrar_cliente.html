<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Crear usuario</title>
    <link rel="stylesheet" href="/Proyecto_Bases/css/estilos.css">
    <link rel="stylesheet" href="/Proyecto_Bases/css/registrar_usuario.css">
</head>

<body>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&display=swap" rel="stylesheet">

<div class="login-panel">

    <h2>Crear Usuario</h2>

    <form action="/Proyecto_Bases/php/Cliente/registrar_cliente.php" method="POST">

        <label>Nombre</label>
        <input type="text" name="nombre" required>

        <label>Apellido</label>
        <input type="text" name="apellido" required>

        <label>Cédula</label>
        <input type="number" name="cedula" required>

        <label>Cargo</label>
        <input type="text" name="cargo" required>

        <label>Dependencia</label>
        <input type="text" name="dependencia" required>

        <label>Correo</label>
        <input type="email" name="correo" required>

        <label>Contraseña</label>
        <input type="password" name="contrasena" required>

        <button type="submit">Crear</button>

    </form>

</div>

</body>
</html>
