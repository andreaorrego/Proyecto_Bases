<form action="../php/registrar_equipo.php" method="POST">

       <input type="text"
              name="serie"
              placeholder="Serie"
              required>

       <input type="text"
              name="marca"
              placeholder="Marca"
              required>

       <input type="text"
              name="modelo"
              placeholder="Modelo"
              required>

       <input type="text"
              name="tipo_equipo"
              placeholder="Tipo de equipo"
              required>
       
       <select name="estado" required>
              <option value="Nuevo">Nuevo</option>
              <option value="Usado">Usado</option>
              <option value="Mantenimiento">Mantenimiento</option>
       </select>

       <input type="number"
              name="id_proveedor"
              placeholder="ID proveedor"
              required>

       <button type="submit">
              Registrar
       </button>

</form>
