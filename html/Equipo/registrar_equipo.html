<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Equipo</title>
    <link rel="stylesheet" href="/Proyecto_Bases/css/estilos.css">
    <link rel="stylesheet" href="/Proyecto_Bases/css/registrar_usuario.css">
</head>

<body>

    <div class="login-panel">
        <h2>Registrar Nuevo Equipo</h2>
        
        <form action="/Proyecto_Bases/php/Equipo/registrar_equipo.php" method="POST">
            
            <label>Serie</label>
            <input type="text" name="serie">

            <label>Marca</label>
            <input type="text" name="marca">

            <label>Modelo</label>
            <input type="text" name="modelo">

            <label>Tipo</label>
            <input type="text" name="tipo_equipo">

            <label>Proveedor</label>
            <select class="select" name="id_proveedor">
                <option value="">Seleccione un proveedor</option>
                <option value="">2</option>
            </select>

            <button type="submit">Guardar Equipo</button>
            <button type="button" onclick="window.location='/Proyecto_Bases/php/Equipo/listar_equipo.php'">Cancelar</button>
        </form>
    </div>

</body>
</html>
